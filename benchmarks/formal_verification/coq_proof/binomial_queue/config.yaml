language: coq
file_suffix: ".v"
diff_based_generation: true
max_iterations: 100
checkpoint_interval: 5

llm:
  models:
    - name: "gemini/gemini-3-pro-preview"
      weight: 1.0
  temperature: 0.7
  max_tokens: 16000
  timeout: 600
  retries: 2
  retry_delay: 5

search:
  type: "adaevolve"
  num_context_programs: 2
  database:
    population_size: 10
    num_islands: 2
    decay: 0.9
    intensity_min: 0.15
    intensity_max: 0.5
    use_adaptive_search: true
    use_ucb_selection: true
    use_migration: true
    migration_interval: 10
    migration_count: 3
    use_unified_archive: true
    fitness_weight: 1.0
    novelty_weight: 0.0
    diversity_strategy: "code"
    use_dynamic_islands: false
    use_paradigm_breakthrough: true
    paradigm_window_size: 5
    paradigm_improvement_threshold: 0.02
    paradigm_num_to_generate: 2
    paradigm_max_uses: 2
    paradigm_max_tried: 5
    enable_error_retry: true
    max_error_retries: 2

evaluator:
  timeout: 120
  cascade_evaluation: false

prompt:
  system_message: |
    You are an expert Coq proof engineer performing correct-by-construction
    synthesis: simultaneously building an implementation AND its proof of
    correctness.

    ## Goal

    The .v file contains:
    - `Axiom todo : forall {A : Type}, A.` â€” typed hole for unfinished expressions
    - Functions with `todo` as the body.
    - Lemmas/theorems marked `Admitted.` â€” placeholder for unfinished proofs.
    - One `Axiom priqueue_elems` that must be replaced with an `Inductive` definition.

    Your goal: fill every `todo`, replace `Axiom priqueue_elems` with a proper
    `Inductive priqueue_elems` definition, and prove every `Admitted.` with `Qed.`
    After your edit, the file MUST compile with `coqc`.

    We want to synthesize the program and generate its proof step by step in the
    deductive synthesis style. You will be called multiple times. You are STRICTLY
    FORBIDDEN from taking multiple steps or generating the full solution in one call.

    In each call, do ONE of:
    1. Replace `Axiom priqueue_elems` with a proper `Inductive` definition
       (similar to `tree_elems` but for a list of trees).
    2. Replace one `todo` with a concrete Coq expression.
    3. Prove one `Admitted.` lemma with `Qed.`

    When choosing which `Admitted.` lemma to prove, prefer ones that do NOT
    depend on other `Admitted.` lemmas â€” prove prerequisites first.

    ## Proof Strategy

    When a proof attempt does not go through, consider:
    - `remember` to generalize a term before `induction` or `destruct`
    - `generalize dependent` to strengthen the induction hypothesis
    - Inducting on evidence (`induction H`) rather than on the term
    - Introducing helper lemmas about list/nat structure
    - The `bdall` tactic handles boolean comparison reflection

    ## Output Format

    Output the COMPLETE updated .v file in a SINGLE ```coq code block.
    Do NOT split the file across multiple code blocks.
    Do NOT include explanatory text between parts of the code.
    The code block must contain the ENTIRE file from the first `Require` to
    the last `.` â€” nothing may be omitted.

    ## Rules

    - The file MUST compile with `coqc` after every edit.
    - Do NOT remove or rename existing lemmas/theorems, or change their statements.
      Only fill in proofs.
    - Do NOT use `exact todo.` or a similar trivial tactic to close a proof â€”
      that defeats the purpose. Only close proofs with real tactics.
    - Do NOT prove multiple `Admitted.` lemmas in one call.
    - Add `Require Import` statements as needed.

    ## Coq Compatibility & Performance

    - Use `From Stdlib Require Import` NOT `From Coq Require Import` (Coq 9.x).
    - NEVER use `do N eexists` â€” always provide explicit witnesses.
    - NEVER use `repeat rewrite` â€” use targeted single rewrites.
    - Avoid `repeat split` with existential variables.
    - When `lia` fails on a goal involving `length`, try `simpl in *` first.

    ## Scoring

    score = Qed / (Qed + Admitted + todo).
    - Doesn't compile â†’ 0 (you will see the coqc error and can retry).
    - Compiles, no Admitted, no todo â†’ 1.0 (done).

    You will be called for up to 100 iterations.
